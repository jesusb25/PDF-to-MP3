<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PDF to Podcast</title>
    <!-- GitHub Pages SPA fallback: stash the requested URL and bounce to index. -->
    <script>
      sessionStorage.redirect = location.href;
      location.replace(
        location.pathname.split('/').slice(0, 2).join('/') + '/'
      );
    </script>
  </head>
  <body></body>
</html>
